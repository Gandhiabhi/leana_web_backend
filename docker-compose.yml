services:
  postgres:
    image: postgres:16-alpine
    container_name: leana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leana
    ports:
      - '5432:5432'
    volumes:
      - leana_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: leana-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/leana?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/leana?schema=public
    ports:
      - '4000:4000'

volumes:
  leana_pgdata:
